<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | HackUnion</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to HackUnion home or explore our programs." />
  <meta name="robots" content="noindex, follow" />
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png" />
  <link rel="shortcut icon" href="images/favicon/favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 78px - 300px);
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 1rem;
    }

    .error-container {
      animation: fadeInUp 0.7s ease-out;
    }

    .error-code {
      font-size: clamp(4rem, 15vw, 12rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
      line-height: 1;
      letter-spacing: -2px;
    }

    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--text);
      margin: 1rem 0 0.6rem;
      font-weight: 700;
    }

    .error-message {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 55ch;
      margin: 0 auto 1.5rem;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .error-actions a {
      text-decoration: none;
    }

    .error-illustration {
      font-size: 6rem;
      margin-bottom: 1rem;
      display: block;
    }

    @media (min-width: 700px) {
      .error-page {
        padding: 4rem 2rem;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="error-page">
    <div class="error-container">
      <span class="error-illustration">🎯</span>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track to building something great.</p>
      <div class="error-actions">
        <a class="btn btn-primary" href="./">← Back to Home</a>
        <a class="btn btn-secondary" href="programs/">Explore Programs</a>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="main.js" defer></script>
</body>
</html>
