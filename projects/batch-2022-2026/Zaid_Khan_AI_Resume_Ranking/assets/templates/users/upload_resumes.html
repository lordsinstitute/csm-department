{% extends 'users/userbase.html' %}
{% load static %}

{% block title %}Upload Resumes{% endblock %}

{% block content %}

<style>
  .upload-wrapper {
    min-height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;   /* Vertical center */
    padding: 2rem 1rem;
  }

  .upload-card {
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(167, 139, 250, 0.18);
    border-radius: 20px;
    padding: 2.8rem 2.2rem;
    width: 100%;
    max-width: 620px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeInUp 0.9s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .upload-title {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    background: linear-gradient(90deg, #ec4899, #a78bfa, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .form-floating {
    position: relative;
    margin-bottom: 1.8rem;
  }

  .form-floating textarea {
    width: 100%;
    padding: 1.4rem 1rem 0.5rem 2.8rem;
    font-size: 1.05rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(167,139,250,0.22);
    border-radius: 12px;
    color: white;
    min-height: 120px;
  }

  .form-floating textarea:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 0 0.25rem rgba(167,139,250,0.22);
    outline: none;
  }

  .custom-file-input {
    position: relative;
    margin-bottom: 1.2rem;
  }

  .custom-file-input input[type="file"] {
    width: 100%;
  }

  .file-info {
    color: #94a3b8;
    font-size: 0.95rem;
    text-align: center;
  }

  .btn-submit {
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #6366f1, #a78bfa, #ec4899);
    color: white;
    transition: 0.3s;
    margin-top: 1.5rem;
  }

  .btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(99,102,241,0.5);
  }

  @media (max-width: 576px) {
    .upload-card { padding: 2rem 1.5rem; }
  }
</style>

<div class="upload-wrapper">
  <div class="upload-card">

    <h2 class="upload-title">Upload Resumes for AI Matching</h2>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-floating">
        <textarea id="job_description" 
                  name="job_description" 
                  rows="4" 
                  required 
                  placeholder="Enter Job Description">
        </textarea>
      </div>

      <div class="custom-file-input">
        <input type="file" 
               id="resume_files" 
               name="resume_files" 
               multiple 
               accept=".pdf" 
               required>
      </div>

      <p class="file-info">
        Only PDF files are accepted • Multiple uploads supported
      </p>

      <button type="submit" class="btn-submit">
        Analyze & Rank Resumes
      </button>

    </form>

  </div>
</div>

{% endblock %}
