{% extends 'admins/Adminbase.html' %}

{% block content %}
<style>
    body {
        background: linear-gradient(to right, #0f172a, #1e293b);
    }

    .admin-dashboard {
        max-width: 900px;
        margin: 4rem auto;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(12px);
        padding: 2.5rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        color: #f1f5f9;
        animation: fadeIn 1s ease-in-out;
        text-align: center;
    }

    .admin-dashboard h2 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #ffffff;
    }

    .admin-dashboard p {
        font-size: 1.1rem;
        color: #cbd5e1;
        margin-bottom: 2rem;
    }

    .dashboard-actions {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        flex-wrap: wrap;
    }

    .dashboard-actions a {
        padding: 0.8rem 1.6rem;
        background: linear-gradient(to right, #3b82f6, #1d4ed8);
        color: #ffffff;
        font-weight: bold;
        border-radius: 10px;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .dashboard-actions a:hover {
        background: linear-gradient(to right, #1e40af, #1e3a8a);
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media screen and (max-width: 600px) {
        .admin-dashboard h2 {
            font-size: 1.6rem;
        }

        .admin-dashboard p {
            font-size: 1rem;
        }

        .dashboard-actions {
            flex-direction: column;
            gap: 1rem;
        }
    }
</style>

<div class="admin-dashboard">
    <h2>👨‍💼 Welcome Admin, {{ request.session.loggeduser }}</h2>
    <p>You can manage users, monitor forecasts, and oversee AI-generated insights for renewable energy prediction.</p>

    <div class="dashboard-actions">
        <a href="{% url 'RegisterUsersView' %}">👥 View & Activate Users</a>
        <a href="{% url 'UserLogin' %}">🚪 Logout</a>
    </div>
</div>
{% endblock %}
