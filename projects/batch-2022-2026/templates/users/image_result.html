{% extends 'users/userbase.html' %}
{% block content %}

<!-- templates/users/image_result.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Predicted Image</title>
    <style>
        .popup {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }
        .popup img {
            display: block;
            max-width: 90%;
            margin: 5% auto;
        }
    </style>
</head>
<body>
    <div class="popup">
        <img src="{{ output_url }}" alt="Predicted Image">
    </div>
</body>
</html>


{% endblock %}
