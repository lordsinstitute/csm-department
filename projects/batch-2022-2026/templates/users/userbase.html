{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Feature Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url("{% static 'images/speed 55.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 40px;
        }
        .navbar {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: #1e3a8a;
            padding: 0.5rem 2rem;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links li a:hover {
            color: #ffd700;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #ffd700;
            transition: width 0.3s ease;
        }

        .nav-links li a:hover::after {
            width: 100%;
        }

        .special-features {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-bar {
            position: relative;
        }

        .search-bar input {
            padding: 0.5rem 2rem 0.5rem 0.75rem;
            border: none;
            border-radius: 15px;
            outline: none;
            transition: width 0.3s ease;
            width: 150px;
        }

        .search-bar input:focus {
            width: 200px;
        }

        .search-bar button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #1e3a8a;
            cursor: pointer;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(180deg);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #1e3a8a;
                flex-direction: column;
                padding: 1rem;
                text-align: center;
            }

            .nav-links.active {
                display: flex;
            }

            .hamburger {
                display: flex;
            }

            .special-features {
                flex-direction: column;
                gap: 0.5rem;
            }

            .search-bar input {
                width: 100%;
            }
        }

        .dark-mode {
            background: #1a202c;
            color: white;
        }

        .dark-mode .navbar {
            background: linear-gradient(90deg, #2d3748, #4a5568);
        }

        .dark-mode .navbar.scrolled {
            background: #2d3748;
        }

        .dark-mode .search-bar input {
            background: #2d3748;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
    <img src="{% static 'images/images.png' %}" alt="Logo" style="height: 40px;">
</a>
            <ul class="nav-links">
                <li><a href="{% url 'userhome' %}">Home</a></li>
                <li><a href="{% url 'metrics' %}">Training</a></li>
                <li><a href="{% url 'yolo_predict' %}">Image</a></li>
                <li><a href="{% url 'live_view' %}">Live</a></li>
                <li><a href="{%  url 'home' %}">Logout</a></li>
            </ul>
            <div class="special-features">
                
                <button class="theme-toggle" aria-label="Toggle theme">😁</button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
{% block content %}
{% endblock %}
    <script>
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            navbar.classList.toggle('scrolled', window.scrollY > 50);
        });

        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        const themeToggle = document.querySelector('.theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = document.body.classList.contains('dark-mode') ? '😁' : '😎';
        });

        const searchInput = document.querySelector('.search-bar input');
        searchInput.addEventListener('input', (e) => {
            console.log('Searching for:', e.target.value);
        });
    </script>
</body>
</html>
