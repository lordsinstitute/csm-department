{% extends 'users/userbase.html' %}
{% block content %}

<!-- templates/users/video_result.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Predicted Video</title>
    <style>
        .popup {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }
        .popup video {
            display: block;
            max-width: 90%;
            margin: 5% auto;
        }
    </style>
</head>
<body>
    <div class="popup">
        <video controls autoplay>
            <source src="{{ output_url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
</body>
</html>


{% endblock %}
